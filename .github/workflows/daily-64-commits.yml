name: Daily 64 Commits

on:
  schedule:
    # 05:00 Europe/Istanbul = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-batch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate 64 commits
        env:
          COUNT: "64"
        run: .github/scripts/daily-64-commits.sh

      - name: Push
        run: git push
